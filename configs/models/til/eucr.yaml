model: eucr
loader: task_incremental_loader
optimizer: sgd
amp: false
lr: 0.003
inner_steps: 1
grad_clip_norm: 5.0
reg_lambda: 1000
reg_granularity: channel
importance_batches: 20
eucr_uncertainty: both
probe_stages: 1,2,3,4
probe_loss_weight: 0.5
nu: 0.9
proto_factor: 3
kl_warmup_epochs: 20
eucr_depth: 18
eucr_distance_metric: cosine
eucr_head: pignistic
